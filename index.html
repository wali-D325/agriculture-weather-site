<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriWeather Pro+ | Elite Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #70E000; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: #060d08; color: white; margin: 0; padding-bottom: 90px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .btn-primary { background: linear-gradient(135deg, #70E000, #38b000); color: #000; font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #70E000; }
        input[type="number"] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; color: white; outline: none; }
    </style>
</head>
<body>

<div id="authModal" class="fixed inset-0 flex items-center justify-center bg-black/95 z-[2000]">
    <div class="glass-card p-8 w-full max-w-sm mx-4">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black tracking-tighter">AGRIWEATHER <span class="text-[#70E000]">PRO+</span></h2>
        </div>
        <input id="username" class="w-full p-4 mb-4 rounded-xl bg-white/5 border border-white/10 text-white outline-none" placeholder="Username">
        <button onclick="login()" class="w-full py-4 btn-primary rounded-xl">ACCESS ACCOUNT</button>
    </div>
</div>

<header class="sticky top-0 z-10 bg-black/80 backdrop-blur-md border-b border-white/10 p-4 flex justify-between items-center">
    <div class="font-black text-lg tracking-tighter">AGRIWEATHER <span class="text-[#70E000]">PRO+</span></div>
    <div id="offlineTag" class="hidden bg-red-600 text-[10px] px-2 py-1 rounded font-bold">OFFLINE</div>
</header>

<main id="mainUI" class="hidden p-4 max-w-4xl mx-auto">
    
    <div id="tab-home" class="tab-content active space-y-6">
        <div class="flex gap-2">
            <input id="citySearch" type="text" placeholder="Enter City..." class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
            <button onclick="searchCity()" class="btn-primary px-6 rounded-xl">GO</button>
        </div>

        <div class="glass-card p-6 text-center border-b-4 border-[#70E000]">
            <h1 id="cityName" class="text-2xl font-bold uppercase tracking-wide">--</h1>
            <div id="currentTemp" class="text-6xl font-light my-2">--°C</div>
            <p id="description" class="text-gray-400 capitalize">Syncing data...</p>
        </div>

        <div>
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Next 24 Hours</h3>
            <div id="hourlyRow" class="flex gap-3 overflow-x-auto no-scrollbar pb-2"></div>
        </div>

        <div class="glass-card divide-y divide-white/5">
            <h3 class="p-4 text-xs font-bold text-gray-500 uppercase">7-Day Forecast</h3>
            <div id="dailyRow"></div>
        </div>
    </div>

    <div id="tab-market" class="tab-content space-y-6">
        <h2 class="text-xl font-bold">Commodity Prices</h2>
        <div class="glass-card p-4 space-y-4" id="profitBody"></div>
    </div>

    <div id="tab-tools" class="tab-content space-y-6">
        <h2 class="text-xl font-bold">Precision Agriculture Tools</h2>
        
        <div class="glass-card p-6 space-y-4 border-l-4 border-[#70E000]">
            <h3 class="font-bold text-lg flex items-center gap-2">🚜 Fertilizer Estimator</h3>
            <div class="flex flex-col gap-3">
                <label class="text-xs text-gray-400">Land Area (Hectares)</label>
                <input type="number" id="landSize" placeholder="e.g. 2.5" step="0.1">
                
                <label class="text-xs text-gray-400">Crop Type</label>
                <select id="cropType" class="bg-white/5 border border-white/10 p-3 rounded-lg text-white">
                    <option value="120">Maize (High Yield)</option>
                    <option value="80">Soya Beans</option>
                    <option value="150">Rice</option>
                    <option value="60">Legumes</option>
                </select>
                
                <button onclick="calcFertilizer()" class="btn-primary py-3 rounded-lg mt-2">CALCULATE NEEDS</button>
            </div>
            
            <div id="fertResult" class="hidden mt-4 p-4 bg-[#70E000]/10 rounded-lg border border-[#70E000]/30 text-center">
                <div class="text-xs uppercase text-[#70E000] font-bold">Estimated Requirement</div>
                <div id="fertBags" class="text-3xl font-black">0 Bags</div>
                <div class="text-[10px] text-gray-400 mt-1">*Based on 50kg NPK bags</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 text-center opacity-50">
                <div class="text-3xl mb-2">💧</div>
                <div class="text-sm font-bold">Irrigation (Soon)</div>
            </div>
            <div class="glass-card p-4 text-center opacity-50">
                <div class="text-3xl mb-2">🌱</div>
                <div class="text-sm font-bold">Spacing (Soon)</div>
            </div>
        </div>
    </div>

</main>

<nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 py-3 flex justify-around items-center">
    <button onclick="showTab('home')" class="nav-item active flex flex-col items-center" id="nav-home">
        <span class="text-xl">🏠</span>
        <span class="text-[10px]">Home</span>
    </button>
    <button onclick="showTab('market')" class="nav-item flex flex-col items-center" id="nav-market">
        <span class="text-xl">📈</span>
        <span class="text-[10px]">Market</span>
    </button>
    <button onclick="showTab('tools')" class="nav-item flex flex-col items-center" id="nav-tools">
        <span class="text-xl">🚜</span>
        <span class="text-[10px]">Tools</span>
    </button>
    <button onclick="logout()" class="flex flex-col items-center text-gray-500">
        <span class="text-xl">👤</span>
        <span class="text-[10px]">Logout</span>
    </button>
</nav>

<script>
const API_KEY = "5d73c7bcc743e425081a820c2dbfdb97";

// TAB NAVIGATION
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active', 'text-[#70E000]'));
    document.getElementById('nav-' + tabId).classList.add('active', 'text-[#70E000]');
}

// FERTILIZER LOGIC
function calcFertilizer() {
    const area = parseFloat(document.getElementById('landSize').value);
    const nitrogenNeeded = parseFloat(document.getElementById('cropType').value);
    
    if(!area || area <= 0) return alert("Please enter a valid land size");

    // Calculation: (Area * N required) / (23% N in a standard NPK 23:10:5 bag) / 50kg per bag
    const totalBags = Math.ceil((area * nitrogenNeeded) / (0.23 * 50));
    
    const resultDiv = document.getElementById('fertResult');
    resultDiv.classList.remove('hidden');
    document.getElementById('fertBags').innerText = totalBags + " Bags";
}

// AUTH & WEATHER (Same as previous version)
function login() {
    const u = document.getElementById("username").value;
    if(!u) return alert("Enter Username");
    localStorage.setItem("agri_session", u);
    startApp();
}

function logout() {
    localStorage.removeItem("agri_session");
    location.reload();
}

function startApp() {
    document.getElementById("authModal").classList.add("hidden");
    document.getElementById("mainUI").classList.remove("hidden");
    navigator.geolocation.getCurrentPosition(
        pos => fetchWeatherData(pos.coords.latitude, pos.coords.longitude),
        () => fetchWeatherData(null, null, "Lilongwe")
    );
}

async function searchCity() {
    const city = document.getElementById("citySearch").value.trim();
    if(city) fetchWeatherData(null, null, city);
}

async function fetchWeatherData(lat, lon, city = "") {
    let url = city 
        ? `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
        : `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        renderUI(data);
    } catch (err) { console.error(err); }
}

function renderUI(data) {
    const current = data.list[0];
    document.getElementById("cityName").innerText = data.city.name;
    document.getElementById("currentTemp").innerText = Math.round(current.main.temp) + "°C";
    document.getElementById("description").innerText = current.weather[0].description;

    document.getElementById("hourlyRow").innerHTML = data.list.slice(0, 8).map(item => `
        <div class="min-w-[80px] glass-card p-3 text-center border-t-2 border-[#70E000]">
            <div class="text-[10px] text-gray-400">${new Date(item.dt*1000).getHours()}:00</div>
            <img src="https://openweathermap.org/img/wn/${item.weather[0].icon}.png" class="mx-auto w-8">
            <div class="font-bold text-[#70E000]">${Math.round(item.main.temp)}°</div>
        </div>
    `).join('');

    let dailyHtml = "";
    for(let i=0; i < data.list.length; i+=8) {
        const d = data.list[i];
        dailyHtml += `<div class="flex items-center p-4">
            <div class="w-16 text-sm font-bold">${new Date(d.dt*1000).toLocaleDateString('en',{weekday:'short'})}</div>
            <img src="https://openweathermap.org/img/wn/${d.weather[0].icon}.png" class="w-8 mx-4">
            <div class="flex-1 text-xs text-gray-400 uppercase">${d.weather[0].main}</div>
            <div class="font-bold">${Math.round(d.main.temp)}°C</div>
        </div>`;
    }
    document.getElementById("dailyRow").innerHTML = dailyHtml;
    renderMarket();
}

function renderMarket() {
    const trends = [
        {name: "Maize", price: "850 MWK", status: "UP", color: "#70E000"},
        {name: "Soya", price: "1,100 MWK", status: "DOWN", color: "#ff4d4d"}
    ];
    document.getElementById("profitBody").innerHTML = trends.map(t => `
        <div class="flex items-center justify-between">
            <div><div class="font-bold">${t.name}</div><div class="text-[10px]" style="color:${t.color}">${t.status}</div></div>
            <div class="bg-[#70E000] text-black px-3 py-1 rounded font-black text-xs">${t.price}</div>
        </div>
    `).join('');
}

window.onload = () => { if(localStorage.getItem("agri_session")) startApp(); };
</script>
</body>
</html>
